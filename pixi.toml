[workspace]
authors = ["Harish Naik <harishgnaik@gmail.com>"]
channels = ["conda-forge"]
name = "substrate"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[tasks.build]
cmd = ["cmake"]

[tasks.config]
cmd = [
    "cmake", "-G", "Ninja", "-S", ".", "-B", "build/debug",
    "-DCMAKE_BUILD_TYPE=Debug"]

[dependencies]
gcc = ">=15.2.0,<15.3"
gxx = ">=15.2.0,<15.3"
cmake = ">=4.2.1,<5"
catch2 = ">=3.12.0,<4"
clang-format = ">=21.1.8,<22"
clang-tools = ">=21.1.8,<22"
spdlog = ">=1.17.0,<2"
