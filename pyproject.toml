[tool.ruff]
line-length = 79
indent-width = 4

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint]
select = [
    "E4", "E7"
]
ignore = [
    # "E501",  # line-too-long
    # "E203",  # whitespace-before-':'
    # "W503",  # line-break-before-binary-operator
]