[workspace]
authors = ["Harish Naik <harishgnaik@gmail.com>"]
channels = ["conda-forge"]
name = "substrate"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
fmt = "ruff"

[tasks.py]
env = { PYTHONPATH = "./python" }
cmd = ["python"]

[tasks.jupyter]
cmd = [
    "python",
    "-m",
    "jupyter",
    "lab",
    "--no-browser",
    "--ip=0.0.0.0",
    "--autoreload",
    "--NotebookApp.token=''",
    "--NotebookApp.password=''",
    "--NotebookApp.allow_origin='*'",
    "--NotebookApp.disable_check_xsrf=True",
    "--NotebookApp.allow_origin='*'",
]

env = { PYTHONPATH = "./python" }

[tasks.marimo]
cmd = ["python", "-m", "marimo", "edit", "--headless", "--host", "0.0.0.0"]
env = { PYTHONPATH = "./python" }

[tasks.build]
cmd = ["cmake"]

[tasks.config]
cmd = [
    "cmake",
    "-G",
    "Ninja",
    "-S",
    ".",
    "-B",
    "build/debug",
    "-DCMAKE_BUILD_TYPE=Debug",
]

[dependencies]
catch2 = ">=3.14.0,<4"
clang-format = ">=22.1.3,<23"
clang-tools = ">=22.1.3,<23"
cmake = ">=4.3.1,<5"
gcc = ">=15.2.0,<15.3"
gxx = ">=15.2.0,<15.3"
jsoncpp = ">=1.9.7,<2"
jupyter = ">=1.1.1,<2"
loguru = ">=0.7.3,<0.8"
mcp = ">=1.27.0,<2"
openjdk = ">=25.0.2,<26"
polars = ">=1.39.3,<2"
pydantic = ">=2.13.0,<3"
pytest = ">=9.0.3,<10"
python-lsp-ruff = ">=2.3.1,<3"
python-lsp-server = ">=1.14.0,<2"
ruff = ">=0.15.10,<0.16"
spdlog = ">=1.17.0,<2"
websockets = ">=16.0,<17"
python = ">=3.14.4,<3.15"
pyzmq = ">=27.1.0,<28"
playwright = ">=1.59.1,<2"
clang = ">=22.1.3,<23"

[pypi-dependencies]
databento = ">=0.75.0, <0.76"
pylint-pytest = ">=1.1.7, <2"
marimo = ">=0.23.1, <0.24"

[target.linux-64.dependencies]
sbe-cxx = ">=1.37.1,<2"
